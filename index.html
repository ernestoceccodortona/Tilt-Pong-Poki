<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tilt Pong</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

<style>
    :root { --bg-color: #000; }
    * { 
        box-sizing: border-box; 
        -webkit-touch-callout: none; 
        margin: 0; 
        padding: 0; 
        touch-action: none; 
    }
    
    body, html { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: var(--bg-color); 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        color: white; 
        user-select: none; 
        position: fixed; 
    }
    
    #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
    canvas { display: block !important; width: 100% !important; height: 100% !important; z-index: 2; border: none !important; }
    
    #ui-layer { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        pointer-events: none; 
        z-index: 10; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding-top: 40px; 
    }
    
    #lvl-tag { 
        font-size: 0.7rem; 
        letter-spacing: 4px; 
        opacity: 0.6; 
        text-transform: uppercase; 
        margin-bottom: 5px; 
        font-weight: 600;
    }
    
    #timer-display { 
        font-size: 4.5rem; 
        font-weight: 300; /* Leggero ma leggibile grazie al design del font */
        letter-spacing: 1px; /* Qui i numeri respirano molto meglio */
        line-height: 1; 
    }
    
    #pause-btn, #music-btn { 
        position: absolute; 
        top: 20px; 
        z-index: 1000; 
        padding: 10px 18px; 
        background: rgba(255, 255, 255, 0.08); 
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 12px; /* Meno arrotondato, più moderno */
        pointer-events: auto; 
        cursor: pointer; 
        font-size: 0.65rem; 
        letter-spacing: 1.5px; 
        font-weight: 700;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.9);
    }
    
    #pause-btn { left: 20px; }
    #music-btn { right: 20px; }

    .menu { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
        background: #000; 
        z-index: 500; 
        text-align: center; 
        pointer-events: auto; 
    }
    
    h1 { 
        font-weight: 800; 
        letter-spacing: 8px; 
        margin-bottom: 40px; 
        text-transform: uppercase; 
        font-size: 2.4rem;
    }
    
    .stat-value { 
        font-size: 1.3rem; 
        font-weight: 500; 
        margin-bottom: 30px; 
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.7);
    }
    
    button { 
        margin: 10px; 
        padding: 16px 40px; 
        /* Nuovo stile uniforme */
        background: rgba(255, 255, 255, 0.08); 
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white; /* Testo bianco */
        border-radius: 14px; 
        font-size: 0.85rem; 
        font-weight: 700; 
        letter-spacing: 2px; 
        cursor: pointer; 
        text-transform: uppercase; 
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    button:active {
        transform: scale(0.92);
        background: rgba(255, 255, 255, 0.15); /* Leggero feedback al click */
    }

    button[onclick="resetGame()"] {
    border: 1px solid rgba(255, 255, 255, 0.3);
}
    
</style>
</head>
<body>

    <div id="game-container">
        <div id="music-btn" onclick="toggleMusic()">MUSIC: ON</div>
        
        <div id="ui-layer">
            <div id="lvl-tag">Level <span id="lvl-num">1</span></div>
            <div id="timer-display">20</div>
        </div>
        <div id="pause-btn" style="display:none;" onclick="togglePause()">PAUSE</div>

        <div id="overlay" class="menu">
            <h1>TILT PONG</h1>
            <button onclick="startGame(true)">Enter</button>
            <button onclick="startGame(false)">Practice Mode</button>
        </div>

        <div id="pause-menu" class="menu" style="display:none;">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">Resume</button>
            <button onclick="quitToMenu()">Quit</button>
        </div>

        <div id="game-over" class="menu" style="display:none;">
            <h1 style="color: #ff3b30; letter-spacing: 8px;">Time Out</h1>
            <div id="final-score" class="stat-value">0</div>
            <button onclick="resetGame()">Retry</button>
            <button onclick="quitToMenu()">Quit</button>
        </div>
    </div>

    <script>

        // In cima allo script, dopo le costanti iniziali
PokiSDK.init().then(() => {
    console.log("Poki SDK pronto");
    // Comunica a Poki che il caricamento è finito (il menu è visibile)
    PokiSDK.gameLoadingFinished();
}).catch(() => {
    console.log("Poki SDK non caricato");
});

// FORZA LA MODALITÀ TEST (Aggiungi questa riga)
PokiSDK.setDebug(true);

        // Aggiungi questa variabile di controllo in cima al tuo script
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);


        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
        let engine, render, runner, balls = [], isTimed = true, gameActive = false, isPaused = false, timerInterval;
        let currentLevel = 1, timeLeft = 20;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bgmInterval = null;
        let musicOn = true;
        let noteCounter = 0;

        function startBGM() {
    if (bgmInterval || !musicOn) return;
    
    // Reset del contatore delle note ogni volta che la musica parte da zero
    noteCounter = 0; 
    
    const melody = [330, 392, 440, 523, 440, 392, 330, 294, 262, 294, 330, 262, 196, 220, 262, 330];
    const bass = [165, 147, 131, 196];

            bgmInterval = setInterval(() => {
                const time = audioCtx.currentTime;
                const oscMel = audioCtx.createOscillator();
                const gainMel = audioCtx.createGain();
                oscMel.type = 'triangle';
                oscMel.frequency.setValueAtTime(melody[noteCounter % 16], time);
                gainMel.gain.setValueAtTime(0.2, time);
                gainMel.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
                oscMel.connect(gainMel); gainMel.connect(audioCtx.destination);
                oscMel.start(); oscMel.stop(time + 0.4);

                if (noteCounter % 4 === 0) {
                    const oscBass = audioCtx.createOscillator();
                    const gainBass = audioCtx.createGain();
                    oscBass.type = 'square';
                    oscBass.frequency.setValueAtTime(bass[(noteCounter / 4) % 4] / 2, time);
                    gainBass.gain.setValueAtTime(0.1, time);
                    gainBass.gain.exponentialRampToValueAtTime(0.001, time + 0.6);
                    oscBass.connect(gainBass); gainBass.connect(audioCtx.destination);
                    oscBass.start(); oscBass.stop(time + 0.6);
                }
                noteCounter++;
            }, 300);
        }

        function stopBGM() {
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
        }

        function toggleMusic() {
            musicOn = !musicOn;
            document.getElementById('music-btn').innerText = musicOn ? "MUSIC: ON" : "MUSIC: OFF";
            musicOn ? startBGM() : stopBGM();
        }

        // Aggiungi questa funzione di supporto per pulire davvero tutto
function cleanupGame() {

    // Assicurati che il canvas precedente sparisca davvero dal DOM
    const container = document.getElementById('game-container');
    const canvases = container.getElementsByTagName('canvas');
    for (let c of canvases) c.remove();

    gameActive = false;
    clearInterval(timerInterval);
    
    // Fermiamo l'intervallo e resettiamo la posizione della melodia
    stopBGM();
    noteCounter = 0;
    
    // Reset del colore di sfondo al nero originale
    document.body.style.setProperty('--bg-color', '#000');
    
    if (runner) {
        Runner.stop(runner);
        runner = null;
    }
    
    if (render) {
        Render.stop(render);
        // Rimuoviamo il canvas dal DOM
        if (render.canvas) render.canvas.remove();
        render = null;
    }
    
    if (engine) {
        // Pulisce tutti i corpi e i vincoli
        Composite.clear(engine.world, false);
        engine = null;
    }
    
    // Reset grafico e variabili
    currentLevel = 1;
    timeLeft = 20;
    document.getElementById('lvl-num').innerText = currentLevel;
    document.getElementById('timer-display').innerText = timeLeft;
    document.getElementById('timer-display').style.display = 'block';
}

function quitToMenu() {
    PokiSDK.gameplayStop();
    cleanupGame(); // Usa la nuova funzione di pulizia
    document.getElementById('game-over').style.display = 'none';
    document.getElementById('pause-menu').style.display = 'none';
    document.getElementById('pause-btn').style.display = 'none';
    document.getElementById('overlay').style.display = 'flex';
}

async function resetGame() {
    // 1. Chiediamo a Poki di mostrare un annuncio (Commercial Break)
    // Poki deciderà in automatico se mostrarlo o saltarlo in base alla frequenza

    // Forza lo stop di ogni suono prima del break
    stopBGM();
    
    PokiSDK.commercialBreak().then(() => {
        console.log("Fine pubblicità (o saltata): il gioco riprende.");

        // 2. Pulisci tutto prima di ripartire (il tuo codice originale)
        cleanupGame();
        
        // 3. Prepariamo la UI
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('pause-btn').style.display = 'block';

        // 4. Piccola pausa per il Garbage Collector
        setTimeout(async () => {
            // Proviamo il fullscreen (opzionale su Poki)
            try { 
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen(); 
                }
            } catch (e) {
                console.log("Fullscreen non disponibile");
            }

            // 5. Inizializza il motore fisico e gli oggetti
            init();

            // 6. Avvia la musica e segnala a Poki che il gameplay è iniziato
            if(musicOn) startBGM();
            PokiSDK.gameplayStart(); 
            
        }, 150);
    });
}

        function togglePause() {
            isPaused = !isPaused;
            engine.enabled = !isPaused;
            if (isPaused) { clearInterval(timerInterval); stopBGM(); }
            else { if (isTimed) startTimer(); if (musicOn) startBGM(); }
            document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
        }

        function getVpWidth() { return window.visualViewport ? window.visualViewport.width : window.innerWidth; }
        function getVpHeight() { return window.visualViewport ? window.visualViewport.height : window.innerHeight; }

        function playSfx(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'hit') { osc.frequency.setValueAtTime(440, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); }
            else if (type === 'void') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2); }
            else if (type === 'bonus') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.3); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3); }
            else if (type === 'gameover') { osc.type = 'square'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.5); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5); }
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        async function startGame(timed) {
    // 1. Segnale a Poki: il gioco è partito
    PokiSDK.gameplayStart();

    // 2. Pulisci la fisica del menu (rimuove la pallina interattiva)
    cleanupGame();
    
    // 3. Reset sfondo al nero richiesto
    document.body.style.setProperty('--bg-color', '#000');

    // 4. Ripristino Audio (indispensabile per mobile)
    if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }

    // 5. Richiesta Permessi Giroscopio (iOS 13+)
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
            const permissionState = await DeviceMotionEvent.requestPermission();
            if (permissionState !== 'granted') console.log("Permesso giroscopio negato");
        } catch (e) {
            console.error("Errore permessi sensori:", e);
        }
    }

    // 6. Fullscreen (Tentativo esplicito)
    try {
        const el = document.documentElement;
        if (el.requestFullscreen) await el.requestFullscreen();
        else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen(); // Safari
    } catch (e) {
        console.log("Fullscreen negato o non supportato");
    }

    // 7. Configurazione UI
    isTimed = timed;
    document.getElementById('timer-display').style.display = isTimed ? 'block' : 'none';
    document.getElementById('overlay').style.display = 'none';
    
    // IMPORTANTE: Mostriamo il tasto pausa solo qui
    document.getElementById('pause-btn').style.display = 'block';
    
    // 8. Avvio Musica e Motore di gioco
    if (musicOn) startBGM();
    
    // Avvia la logica di gioco (non menu mode)
    init(false);
}

        function init(isMenuMode = false) {
    const w = getVpWidth(), h = getVpHeight();
    
    engine = Engine.create(); 
    engine.enabled = true;
    engine.gravity.x = 0; 
    engine.gravity.y = 0;
    
    render = Render.create({ 
        element: document.getElementById('game-container'), 
        engine: engine, 
        options: { width: w, height: h, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio } 
    });
    
    balls = []; 
    addBall(); 
    
    // Se non è il menu, genera i mattoncini e avvia il timer
    if (!isMenuMode) {
        spawnLevel(w, h);
        if (isTimed) startTimer();
        document.getElementById('pause-btn').style.display = 'block';
    } else {
        document.getElementById('pause-btn').style.display = 'none';
    }
    
    Render.run(render); 
    runner = Runner.create(); 
    Runner.run(runner, engine);
    
    gameActive = true; 
    isPaused = false;

    // Gestione collisioni e bordi (il tuo codice esistente...)
    Events.on(engine, 'beforeUpdate', () => {
        balls.forEach(ball => {
            const b = ball.position, v = ball.velocity;
            if (b.x < 12) { Body.setPosition(ball, {x: 12, y: b.y}); Body.setVelocity(ball, {x: -v.x * 0.5, y: v.y}); }
            else if (b.x > w - 12) { Body.setPosition(ball, {x: w - 12, y: b.y}); Body.setVelocity(ball, {x: -v.x * 0.5, y: v.y}); }
            if (b.y < 12) { Body.setPosition(ball, {x: b.x, y: 12}); Body.setVelocity(ball, {x: v.x, y: -v.y * 0.5}); }
            else if (b.y > h - 12) { Body.setPosition(ball, {x: b.x, y: h - 12}); Body.setVelocity(ball, {x: v.x, y: -v.y * 0.5}); }
        });
    });

    // Solo se non siamo nel menu gestiamo i mattoncini
    if (!isMenuMode) {
        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => {
                const b = p.bodyA.label.includes('brick') ? p.bodyA : (p.bodyB.label.includes('brick') ? p.bodyB : null);
                if (b) {
                    playSfx(b.label === 'void_brick' ? 'void' : 'hit');
                    if (b.label === 'void_brick') triggerVoidEffect();
                    Composite.remove(engine.world, b);
                    if (engine.world.bodies.filter(body => body.label.includes('brick')).length === 0) levelWin();
                }
            });
        });
    }
}

        function addBall() {
            const ball = Bodies.circle(getVpWidth()/2, getVpHeight()/2, 12, { restitution: 0.8, friction: 0, frictionAir: 0, label: 'ball', render: { fillStyle: '#ffffff' } });
            balls.push(ball);
            Composite.add(engine.world, ball);
        }

        function spawnLevel(w, h) {
            const colors = ['#FF3B30', '#FFCC00', '#34C759', '#007AFF', '#AF52DE'];
            for(let i = 0; i < 6 + currentLevel; i++) {
                const isVoid = (i < 2 && Math.random() > 0.7);
                Composite.add(engine.world, Bodies.rectangle(Math.floor(50 + Math.random()*(w-100)), Math.floor(160 + Math.random()*(h-280)), 65, 28, {
                    isStatic: true, label: isVoid ? 'void_brick' : 'brick', chamfer: { radius: 6 },
                    render: { fillStyle: isVoid ? 'transparent' : colors[i%colors.length], strokeStyle: isVoid ? '#fff' : 'transparent', lineWidth: isVoid ? 2 : 0 }
                }));
            }
        }

        function triggerVoidEffect() {
            document.body.style.setProperty('--bg-color', `hsl(${Math.random()*360}, 40%, 5%)`);
            engine.world.bodies.filter(b => b.label === 'brick').forEach(b => Body.setPosition(b, { x: 50 + Math.random()*(getVpWidth()-100), y: 160 + Math.random()*(getVpHeight()-280) }));
        }

        function startTimer() { clearInterval(timerInterval); timerInterval = setInterval(() => { timeLeft--; document.getElementById('timer-display').innerText = timeLeft; if (timeLeft <= 0) gameOver(); }, 1000); }
        function levelWin() { currentLevel++; if (currentLevel % 5 === 0) { addBall(); playSfx('bonus'); } if (isTimed) timeLeft += Math.max(2, 12 - currentLevel); document.getElementById('lvl-num').innerText = currentLevel; spawnLevel(getVpWidth(), getVpHeight()); }
        function gameOver() { PokiSDK.gameplayStop(); gameActive = false; clearInterval(timerInterval); Runner.stop(runner); stopBGM(); playSfx('gameover'); document.getElementById('final-score').innerText = "Level: " + currentLevel; document.getElementById('game-over').style.display = 'flex'; }
        
        window.addEventListener('devicemotion', (e) => {
    // Rimosso !isPaused dalla condizione perché nel menu non usiamo la pausa
    if (gameActive && e.accelerationIncludingGravity) {
        // Se è iOS, invertiamo il segno per allinearlo ad Android
        const multiplier = isIOS ? -1 : 1; 
        
        engine.gravity.x = multiplier * (-e.accelerationIncludingGravity.x * 0.8);
        engine.gravity.y = multiplier * (e.accelerationIncludingGravity.y * 0.8);
    }
});

function changeBgRandom() {
    const colors = ['#000000', '#FF3B30', '#FFCC00', '#34C759', '#007AFF', '#AF52DE'];
    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    document.body.style.setProperty('--bg-color', randomColor);
}

// Listener per il click sullo sfondo (overlay del menu)
document.body.addEventListener('click', (e) => {
    // Cambia colore solo se clicchi sullo sfondo (e non sui bottoni)
    if (e.target.tagName !== 'BUTTON' && e.target.id !== 'music-btn') {
        changeBgRandom();
    }
});

// Gestione automatica della pausa (richiesta da Poki)
window.addEventListener('keydown', (ev) => {
    if (ev.keyCode === 32) { // Esempio: Spazio per mettere in pausa
        togglePause();
    }
});

// In fondo allo script, avvia la "Modalità Menu"
document.addEventListener("DOMContentLoaded", () => {
    // Verifica che non sia già stato inizializzato
    if (!engine) init(true); 
});

// Se l'utente esce dalla pagina o Poki apre un overlay
PokiSDK.setDebug(false); // Imposta a true durante lo sviluppo se vuoi log extra

// Questo assicura che il gioco si fermi se Poki prende il controllo
// (ad esempio durante un annuncio o se la finestra perde focus)
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden' && gameActive && !isPaused) {
        togglePause();
    }
});

    </script>
</body>
</html>
